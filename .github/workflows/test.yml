name: Test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        go: [ "oldstable", "stable" ]
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: ${{ matrix.go }}
      - name: Vet
        run: go vet ./...
      - name: Run tests
        run: go test -race -timeout 10m ./...
  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.8
        env:
          CLICKHOUSE_DB: rio_test
          CLICKHOUSE_USER: rio
          CLICKHOUSE_PASSWORD: rio
        ports:
          - 9000:9000
          - 8123:8123
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: 'stable'
      - name: Run tests against ClickHouse
        run: go test -race -timeout 10m ./...
        env:
          RIO_CLICKHOUSE_DSN: clickhouse://rio:rio@localhost:9000/rio_test
